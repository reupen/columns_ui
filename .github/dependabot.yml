version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 3
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: daily
    groups:
      submodules:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /docs
    schedule:
      interval: monthly
    cooldown:
      default-days: 3
    groups:
      docs:
        patterns:
          - "*"
